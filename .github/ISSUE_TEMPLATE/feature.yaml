name: Feature Request
description: Solicite uma nova funcionalidade
title: "[FEATURE] "
labels: ["feature"]

body:
  - type: markdown
    attributes:
      value: |
        Obrigado por sugerir uma nova funcionalidade! Preencha os campos abaixo.

  - type: textarea
    id: description
    attributes:
      label: Descrição
      description: Descreva a funcionalidade solicitada
      placeholder: "Ex: Adicionar seção de habilidades técnicas na página Home"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivação
      description: Por que essa funcionalidade é importante?
      placeholder: "Ex: Melhorar apresentação profissional do portfólio"
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Critérios de Aceite
      description: |
        Liste os critérios que definem quando a funcionalidade está pronta.
        Use checkboxes para facilitar o acompanhamento.
      placeholder: |
        - [ ] Componente SkillsSection criado
        - [ ] Integrado na página Home
        - [ ] Responsivo em mobile
        - [ ] Acessível (WCAG 2.1)
    validations:
      required: true

  - type: textarea
    id: mockup
    attributes:
      label: Mockup ou Exemplo
      description: Adicione um mockup, screenshot ou descrição visual (opcional)

  - type: dropdown
    id: priority
    attributes:
      label: Prioridade
      options:
        - Baixa
        - Média
        - Alta
      default: 1
